  <!-- HEADER -->
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo">
        <a href="index.html">Jenlisa</a>
      </div>

      <nav class="main-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>

  <!-- PAGE TITLE -->
  <section class="page-title section">
    <div class="container">
      <h1>Jenlisa</h1>
      <p>Get in touch for inquiries, collaborations, or creative projects.</p>
    </div>
  </section>
   
  <!-- CONTACT FORM -->
  <section class="contact-form-section section">
    <div class="container">
      <form class="contact-form">

        <label for="name">your name</label>
        <input type="text" id="name" name="name">

        <label for="email">@gmail.com</label>
        <input type="email" id="email" name="email">

        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject">

        <label for="message">your problem/concern</label>
        <textarea id="message" name="message"></textarea>

        <button type="submit">Send</button>

      </form>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <p>JENLISA</p>
    </div>
  </footer>
